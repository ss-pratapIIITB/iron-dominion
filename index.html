<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Dominion - RTS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    #gameCanvas {
      display: block;
      cursor: default;
    }
    #loadingScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      z-index: 100;
    }
    #loadingScreen h1 {
      font-size: 48px;
      color: #c8a94e;
      text-shadow: 0 0 20px #c8a94e88;
      margin-bottom: 16px;
      letter-spacing: 4px;
    }
    #loadingScreen p {
      font-size: 16px;
      color: #888;
      margin-bottom: 32px;
    }
    .loading-bar-bg {
      width: 300px;
      height: 8px;
      background: #222;
      border-radius: 4px;
      overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #c8a94e, #f0d060);
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
  <script>
    // Send browser errors to server for debugging
    window.onerror = function(msg, src, line, col, err) {
      fetch('/__log', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ level:'error', msg: msg + ' @ ' + src + ':' + line, stack: err && err.stack }) });
    };
    const _origError = console.error.bind(console);
    console.error = function(...args) {
      _origError(...args);
      fetch('/__log', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ level:'error', msg: args.map(String).join(' ') }) });
    };
  </script>
</head>
<body>
  <div id="loadingScreen">
    <h1>IRON DOMINION</h1>
    <p>Initializing world...</p>
    <div class="loading-bar-bg">
      <div class="loading-bar-fill" id="loadingBar"></div>
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>

  <!-- Core constants and utilities -->
  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/Sound.js"></script>

  <!-- Sprite loader (Kenney CC0 assets) and renderer -->
  <script src="js/SpriteLoader.js"></script>
  <script src="js/SpriteRenderer.js"></script>

  <!-- Map and environment -->
  <script src="js/Map.js"></script>
  <script src="js/Pathfinder.js"></script>
  <script src="js/FogOfWar.js"></script>

  <!-- Player state -->
  <script src="js/Player.js"></script>

  <!-- Entities -->
  <script src="js/entities/Entity.js"></script>
  <script src="js/entities/Unit.js"></script>
  <script src="js/entities/Building.js"></script>
  <script src="js/entities/ResourceNode.js"></script>
  <script src="js/entities/Projectile.js"></script>

  <!-- Systems -->
  <script src="js/systems/Camera.js"></script>
  <script src="js/systems/InputManager.js"></script>
  <script src="js/systems/SelectionManager.js"></script>
  <script src="js/systems/AIController.js"></script>
  <script src="js/systems/UIManager.js"></script>

  <!-- Main game -->
  <script src="js/Game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
